services:
  - type: web
    name: pageturner
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn pageturner_project.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        fromDatabase:
          name: pageturner-db
          property: connectionString

databases:
  - name: pageturner-db
    plan: free
